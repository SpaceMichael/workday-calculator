<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>返工日數計算器</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --border: #dbe4f0;
      --danger: #b91c1c;
      --success: #0f766e;
      --shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
    }

    .version-badge {
      position: fixed;
      top: 12px;
      right: 16px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      background: rgba(255,255,255,0.85);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 10px;
      backdrop-filter: blur(6px);
      z-index: 100;
      letter-spacing: 0.03em;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.15), transparent 32%),
        linear-gradient(180deg, #eff6ff 0%, var(--bg) 40%, #eef2ff 100%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: min(920px, 100%);
      display: grid;
      gap: 20px;
    }

    .hero,
    .card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(219, 228, 240, 0.9);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 28px 28px 8px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: #dbeafe;
      color: #1d4ed8;
      font-size: 14px;
      font-weight: 700;
    }

    h1 {
      margin: 16px 0 10px;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.1;
    }

    .subtitle {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    .card {
      padding: 24px;
    }

    .grid {
      display: grid;
      gap: 18px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-weight: 700;
      font-size: 15px;
    }

    input[type="text"] {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 10px;
      font: inherit;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-align: center;
      background: #fff;
      color: var(--text);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      -webkit-appearance: none;
      appearance: none;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    input[type="text"]::placeholder {
      color: #9ca3af;
      font-weight: 400;
      letter-spacing: normal;
    }

    .date-parts {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .date-parts input.part-dd,
    .date-parts input.part-mm {
      width: 68px;
      flex-shrink: 0;
    }

    .date-parts input.part-yyyy {
      flex: 1;
    }

    .date-sep {
      font-size: 22px;
      font-weight: 700;
      color: var(--muted);
      flex-shrink: 0;
    }

    .date-fixed {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.08em;
      background: #f1f5f9;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .date-fixed .lock {
      font-size: 14px;
      opacity: 0.5;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 20px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 14px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, background-color 0.2s ease, opacity 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .primary {
      background: var(--primary);
      color: #fff;
    }

    .primary:hover {
      background: var(--primary-dark);
    }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .result {
      margin-top: 22px;
      padding: 22px;
      border-radius: 20px;
      background: linear-gradient(180deg, #eff6ff, #ffffff);
      border: 1px solid #c7d2fe;
      display: grid;
      gap: 10px;
    }

    .result .label {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .result .value {
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 800;
      color: var(--success);
      line-height: 1;
    }

    .result .detail {
      color: var(--text);
      font-size: 15px;
      line-height: 1.7;
    }

    .result .breakdown {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 4px;
    }

    .result .breakdown .chip {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 20px;
      border-radius: 14px;
      background: #dbeafe;
      border: 1px solid #bfdbfe;
      min-width: 90px;
    }

    .result .breakdown .chip-num {
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
    }

    .result .breakdown .chip-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      margin-top: 4px;
    }

    .error {
      margin-top: 16px;
      color: var(--danger);
      font-weight: 700;
      min-height: 1.5em;
    }

    .notes {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
      margin-top: 18px;
    }

    .notes div {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid var(--border);
    }

    @media (max-width: 720px) {
      .grid,
      .notes {
        grid-template-columns: 1fr;
      }

      .hero,
      .card {
        border-radius: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="version-badge">v 23/04/2026</div>
  <main class="app">
    <section class="hero" aria-labelledby="title">
      <div class="eyebrow">返工日數計算器</div>
      <h1 id="title">純日曆天數計算</h1>
      <p class="subtitle">
        輸入開始上班日和最後上班日，系統會直接計算包含首尾兩日的總日數。
        不扣香港公眾假期，也不需要另外輸入閏年設定，會自動判斷。
      </p>
    </section>

    <section class="card" aria-label="日期計算表單">
      <form id="calculatorForm" novalidate>
        <div class="grid">
          <div class="field">
            <label>開始上班日</label>
            <div class="date-parts">
              <input id="startDD" class="part-dd" type="text"
                     inputmode="numeric" placeholder="DD" maxlength="2"
                     autocomplete="off" required>
              <span class="date-sep">/</span>
              <input id="startMM" class="part-mm" type="text"
                     inputmode="numeric" placeholder="MM" maxlength="2"
                     autocomplete="off" required>
              <span class="date-sep">/</span>
              <input id="startYYYY" class="part-yyyy" type="text"
                     inputmode="numeric" placeholder="YYYY" maxlength="4"
                     autocomplete="off" required>
            </div>
          </div>

          <div class="field">
            <label>最後上班日</label>
            <div class="date-fixed">
              <span class="lock">🔒</span>30/04/2025
            </div>
          </div>
        </div>

        <div class="actions">
          <button class="primary" type="submit">計算日數</button>
          <button class="secondary" type="button" id="clearButton">清除</button>
        </div>
      </form>

      <div class="result" aria-live="polite">
        <div class="label">總日數</div>
        <div class="value" id="daysValue">--</div>
        <div class="breakdown" id="breakdown" style="display:none">
          <div class="chip">
            <span class="chip-num" id="yearsValue">0</span>
            <span class="chip-label">年</span>
          </div>
          <div class="chip">
            <span class="chip-num" id="remDaysValue">0</span>
            <span class="chip-label">日</span>
          </div>
        </div>
        <div class="detail" id="detailText">請輸入兩個日期後按「計算日數」。</div>
      </div>

      <div class="error" id="errorText" role="alert"></div>

      <div class="notes">
        <div>計算方式：包含開始日與最後上班日，所以同一天會顯示 1 日。</div>
        <div>輸入格式：分別輸入 <code>DD</code>、<code>MM</code>、<code>YYYY</code>，系統自動跳到下一格。</div>
      </div>
    </section>
  </main>

  <script>
    const form         = document.getElementById('calculatorForm');
    const startDD      = document.getElementById('startDD');
    const startMM      = document.getElementById('startMM');
    const startYYYY    = document.getElementById('startYYYY');
    const daysValue    = document.getElementById('daysValue');
    const detailText   = document.getElementById('detailText');
    const errorText    = document.getElementById('errorText');
    const clearButton  = document.getElementById('clearButton');
    const breakdown    = document.getElementById('breakdown');
    const yearsValue   = document.getElementById('yearsValue');
    const remDaysValue = document.getElementById('remDaysValue');

    const DAY_IN_MS = 24 * 60 * 60 * 1000;
    const END_DATE  = new Date(Date.UTC(2025, 3, 30)); // 30/04/2025 (fixed)

    // Auto-advance to next input when filled
    startDD.addEventListener('input', () => {
      startDD.value = startDD.value.replace(/\D/g, '');
      if (startDD.value.length === 2) startMM.focus();
    });
    startMM.addEventListener('input', () => {
      startMM.value = startMM.value.replace(/\D/g, '');
      if (startMM.value.length === 2) startYYYY.focus();
    });
    startYYYY.addEventListener('input', () => {
      startYYYY.value = startYYYY.value.replace(/\D/g, '');
    });

    function buildStartDate() {
      const dd   = startDD.value.padStart(2, '0');
      const mm   = startMM.value.padStart(2, '0');
      const yyyy = startYYYY.value;
      if (dd.length < 2 || mm.length < 2 || yyyy.length < 4) return null;

      const day   = Number(dd);
      const month = Number(mm);
      const year  = Number(yyyy);
      const d = new Date(Date.UTC(year, month - 1, day));

      if (
        d.getUTCFullYear() !== year ||
        d.getUTCMonth()    !== month - 1 ||
        d.getUTCDate()     !== day
      ) return null;

      return d;
    }

    function formatLabel(date) {
      const day   = String(date.getUTCDate()).padStart(2, '0');
      const month = String(date.getUTCMonth() + 1).padStart(2, '0');
      const year  = date.getUTCFullYear();
      return `${day}/${month}/${year}`;
    }

    function showError(msg) { errorText.textContent = msg; }
    function clearError()   { errorText.textContent = ''; }

    function calcYearsAndDays(start, end) {
      let years = end.getUTCFullYear() - start.getUTCFullYear();
      let anniversary = new Date(Date.UTC(
        start.getUTCFullYear() + years,
        start.getUTCMonth(),
        start.getUTCDate()
      ));
      if (anniversary > end) {
        years--;
        anniversary = new Date(Date.UTC(
          start.getUTCFullYear() + years,
          start.getUTCMonth(),
          start.getUTCDate()
        ));
      }
      const remainingDays = Math.floor((end - anniversary) / DAY_IN_MS) + 1;
      return { years, days: remainingDays };
    }

    function updateResult(totalDays, start, end) {
      const { years, days } = calcYearsAndDays(start, end);
      daysValue.textContent    = `${totalDays}`;
      yearsValue.textContent   = years;
      remDaysValue.textContent = days;
      breakdown.style.display  = 'inline-flex';

      const breakdown_text = years > 0
        ? `共 ${years} 年 ${days} 日`
        : `共 ${days} 日（不足 1 年）`;
      detailText.textContent = `${formatLabel(start)} 至 ${formatLabel(end)}，包含首尾兩日，總計 ${totalDays} 日。${breakdown_text}。`;
    }

    function calculateDays(event) {
      if (event) event.preventDefault();
      clearError();

      if (!startDD.value || !startMM.value || !startYYYY.value) {
        daysValue.textContent = '--';
        detailText.textContent = '請輸入開始上班日的 DD、MM、YYYY。';
        showError('請填寫完整的開始日期。');
        return;
      }

      const start = buildStartDate();
      if (!start) {
        daysValue.textContent = '--';
        detailText.textContent = '日期無效，請檢查 DD / MM / YYYY 是否正確。';
        showError('日期無效，例如不存在的日期如 31/04 或 29/02（非閏年）。');
        return;
      }

      if (END_DATE < start) {
        daysValue.textContent = '--';
        detailText.textContent = '開始上班日不能遲過最後上班日 30/04/2025。';
        showError('開始上班日不能遲過最後上班日。');
        return;
      }

      const days = Math.floor((END_DATE - start) / DAY_IN_MS) + 1;
      updateResult(days, start, END_DATE);
    }

    form.addEventListener('submit', calculateDays);
    clearButton.addEventListener('click', () => {
      startDD.value = '';
      startMM.value = '';
      startYYYY.value = '';
      daysValue.textContent  = '--';
      breakdown.style.display = 'none';
      detailText.textContent = '請輸入兩個日期後按「計算日數」。';
      clearError();
      startDD.focus();
    });
  </script>
</body>
</html>
